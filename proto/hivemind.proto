syntax = "proto3";

package nodepool;

option go_package = "./pb";

message LoginRequest { 
    string username = 1;
    string password = 2;
}

message LoginResponse {
    bool success = 1;
    string status_message = 2;
    string token = 3;
}


message GetBalanceRequest {
    string username = 1;
    string token = 2;
}

message GetBalanceResponse {
    bool success = 1;
    string status_message = 2;
    int64 balance = 3;
}

message RegisterWorkerNodeRequest {
    string username = 1; 
    string ip = 2; 
    int32 cpu_cores = 3;
    int32 memory_gb = 4;
    int32 cpu_score = 5;
    int32 gpu_score = 6;
    int32 gpu_memory_gb = 7;
    string location = 8;
}

message StatusResponse {
    bool success = 1;
    string status_message = 2;
}
message RunningStatusRequest {
    string username = 1; 
    string status = 2; 
    float cpu_usage = 3; 
    float memory_usage = 4; 
    float gpu_usage = 5; 
    float gpu_memory_usage = 6; 
}
message RunningStatusResponse {
    bool success = 1;
    string status_message = 2;
}

message UploadTaskRequest {
    string task_id = 1;
    string torrent = 2; 
    int32 memory_gb = 3;
    int32 cpu_score = 4;
    int32 gpu_score = 5;
    int32 gpu_memory_gb = 6;
    string location = 7;
    int32 host_count = 8; 
    string token = 9; 
    int64 max_cpt = 10; 
}

message UploadTaskResponse {
    bool success = 1;
    string status_message = 2;
}

message GetAllUserTasksRequest {
    string token = 1; 
}

message GetAllUserTasksResponse {
    repeated TaskInfo tasks = 1;
}

message TaskInfo {
    string task_id = 1;
    string status = 2;
    string status_message = 3;
    float cpu_usage = 4; 
    float memory_usage = 5; 
    float gpu_usage = 6; 
    float gpu_memory_usage = 7; 
    string worker_ip = 8; 
}

message TaskOutputUploadRequest {
    string task_id = 1;
    string output = 2;
    string token = 3; 
}
message TaskOutputUploadResponse {
    bool success = 1;
    string status_message = 2;
}
message TaskResultUploadRequest {
    string task_id = 1;
    string result_torrent = 2; 
    string token = 3; 
}
message TaskResultUploadResponse {
    bool success = 1;
    string status_message = 2;
}

message GetTaskResultRequest {
    string task_id = 1;
    string token = 2; 
}

message GetTaskResultResponse {
    bool success = 1;
    string status_message = 2;
    string result_torrent = 3;
}


message ExecuteTaskRequest {
    string task_id = 1;
    string torrent = 2; 
    float cpu_usage = 3; 
    float gpu_usage = 4; 
    int32 memory_gb = 5;
    int32 gpu_memory_gb = 6;
}

message ExecuteTaskResponse {
    bool success = 1;
    string status_message = 2;
}

message TaskOutputRequest {
    string task_id = 1;
    string token = 2; 
}
message TaskOutputResponse {
    bool success = 1;
    string status_message = 2;
    string output = 3;
}

message StopTaskRequest {
    string task_id = 1;
    string token = 2;
}

message StopTaskResponse {
    bool success = 1;
    string status_message = 2;
}
message StopTaskExecutionRequest {
    string task_id = 1;
}

message StopTaskExecutionResponse {
    bool success = 1;
    string status_message = 2;
}
message TaskUsageRequest {
    string task_id = 1;
    float cpu_usage = 2; 
    float memory_usage = 3; 
    float gpu_usage = 4; 
    float gpu_memory_usage = 5; 
    string token = 6; 
}
message TaskUsageResponse {
    bool success = 1;
    string status_message = 2;
}

message RefreshTokenRequest {
    string old_token = 1;
}
message RefreshTokenResponse {
    bool success = 1;
    string status_message = 2;
    string new_token = 3;
}

message TasklogRequest {
    string task_id = 1;
    string token = 2; 
}
message TasklogResponse {
    bool success = 1;
    string log = 2;
}

message ResourceRequirements {
    int32 cpu_cores = 1;
    int32 memory_gb = 2;
    int32 gpu_score = 3;
    int32 gpu_memory_gb = 4;
}

message DAGNode {
    string task_id = 1;
    repeated string artifact_inputs = 2;
    ResourceRequirements resource_requirements = 3;
    int32 max_retries = 4;
    int64 deadline_unix = 5;
    bool deterministic = 6;
    bool side_effects = 7;
    int32 priority = 8;
    string execution_package_ref = 9;
}

message DAGEdge {
    string from_task_id = 1;
    string to_task_id = 2;
}

message DAGIR {
    string job_id = 1;
    repeated DAGNode nodes = 2;
    repeated DAGEdge edges = 3;
}

message ExecutionPackage {
    string runtime_version = 1;
    string task_code_ref = 2;
    repeated string artifact_refs = 3;
    map<string, string> constraints = 4;
}

message ArtifactChunk {
    string chunk_id = 1;
    string sha256 = 2;
    int64 offset = 3;
    int64 size = 4;
}

message ArtifactManifest {
    string artifact_id = 1;
    repeated ArtifactChunk chunks = 2;
    int64 size = 3;
    string compression = 4;
    string content_type = 5;
    string created_by_task = 6;
}

message CacheSummary {
    int64 cache_epoch = 1;
    bytes bloom_filter = 2;
    string partial_cache_digest = 3;
    int64 artifact_count = 4;
    int64 total_bytes = 5;
}

message PullBatchRequest {
    string worker_id = 1;
    int32 max_inflight_batches = 2;
    int32 available_memory_gb = 3;
    int32 queue_capacity = 4;
    CacheSummary cache_summary = 5;
}

message TaskLease {
    string task_id = 1;
    ExecutionPackage execution_package = 2;
    repeated ArtifactManifest artifacts = 3;
    ResourceRequirements resource_limits = 4;
    int64 deadline_unix = 5;
    int32 priority = 6;
}

message PullBatchResponse {
    bool success = 1;
    string status_message = 2;
    string batch_id = 3;
    repeated TaskLease tasks = 4;
}

message ExecutionMetrics {
    int64 cpu_time_ms = 1;
    int64 wall_time_ms = 2;
    int64 peak_memory_mb = 3;
    int64 download_bytes = 4;
    int64 cache_hits = 5;
}

message CompletedTask {
    string task_id = 1;
    string status = 2;
    string stdout_artifact_ref = 3;
    string stderr_artifact_ref = 4;
    repeated string result_artifact_refs = 5;
    ExecutionMetrics metrics = 6;
}

message CompleteBatchRequest {
    string worker_id = 1;
    string batch_id = 2;
    repeated CompletedTask tasks = 3;
}

message CompleteBatchResponse {
    bool success = 1;
    string status_message = 2;
}

message HeartbeatRequest {
    string worker_id = 1;
    string status = 2;
    int32 available_memory_gb = 3;
    int32 queue_capacity = 4;
}

message HeartbeatResponse {
    bool success = 1;
    string status_message = 2;
}

service BatchRuntimeService {
    rpc PullBatch(PullBatchRequest) returns (PullBatchResponse);
    rpc CompleteBatch(CompleteBatchRequest) returns (CompleteBatchResponse);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}
    

service UserService {
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse); 
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

service NodeManagerService {
    rpc RegisterWorkerNode(RegisterWorkerNodeRequest) returns (StatusResponse);
    rpc ReportStatus(RunningStatusRequest) returns (RunningStatusResponse);
}

service MasterNodeService {
    rpc UploadTask(UploadTaskRequest) returns (UploadTaskResponse);
    rpc GetTaskResult(GetTaskResultRequest) returns (GetTaskResultResponse);
    rpc GetAllUserTasks(GetAllUserTasksRequest) returns (GetAllUserTasksResponse);
    rpc StopTask(StopTaskRequest) returns (StopTaskResponse);
    rpc GetTasklog(TasklogRequest) returns (TasklogResponse);
}

service WorkerNodeService {
    rpc ExecuteTask(ExecuteTaskRequest) returns (ExecuteTaskResponse);
    rpc TaskOutputUpload(TaskOutputUploadRequest) returns (TaskOutputUploadResponse);
    rpc TaskResultUpload(TaskResultUploadRequest) returns (TaskResultUploadResponse);
    rpc TaskOutput(TaskOutputRequest) returns (TaskOutputResponse);
    rpc StopTaskExecution(StopTaskExecutionRequest) returns (StopTaskExecutionResponse);
    rpc TaskUsage(TaskUsageRequest) returns (TaskUsageResponse);
}
