syntax = "proto3";

package nodepool;

option go_package = "./pb";

message LoginRequest { 
    string username = 1;
    string password = 2;
}

message LoginResponse {
    bool success = 1;
    string status_message = 2;
    string token = 3;
}


message GetBalanceRequest {
    string username = 1;
    string token = 2;
}

message GetBalanceResponse {
    bool success = 1;
    string status_message = 2;
    int64 balance = 3;
}

message RegisterWorkerNodeRequest {
    string username = 1; 
    string ip = 2; 
    int32 cpu_cores = 3;
    int32 memory_gb = 4;
    int32 cpu_score = 5;
    int32 gpu_score = 6;
    int32 gpu_memory_gb = 7;
    string location = 8;
}

message StatusResponse {
    bool success = 1;
    string status_message = 2;
}
message RunningStatusRequest {
    string username = 1; 
    string status = 2; 
    float cpu_usage = 3; 
    float memory_usage = 4; 
    float gpu_usage = 5; 
    float gpu_memory_usage = 6; 
}
message RunningStatusResponse {
    bool success = 1;
    string status_message = 2;
}

message UploadTaskRequest {
    string task_id = 1;
    string torrent = 2; 
    int32 memory_gb = 3;
    int32 cpu_score = 4;
    int32 gpu_score = 5;
    int32 gpu_memory_gb = 6;
    string location = 7;
    int32 host_count = 8; 
    string token = 9; 
    int64 max_cpt = 10; 
}

message UploadTaskResponse {
    bool success = 1;
    string status_message = 2;
}

message GetAllUserTasksRequest {
    string token = 1; 
}

message GetAllUserTasksResponse {
    repeated TaskInfo tasks = 1;
}

message TaskInfo {
    string task_id = 1;
    string status = 2;
    string status_message = 3;
    float cpu_usage = 4; 
    float memory_usage = 5; 
    float gpu_usage = 6; 
    float gpu_memory_usage = 7; 
    string worker_ip = 8; 
}

message TaskOutputUploadRequest {
    string task_id = 1;
    string output = 2;
    string token = 3; 
}
message TaskOutputUploadResponse {
    bool success = 1;
    string status_message = 2;
}
message TaskResultUploadRequest {
    string task_id = 1;
    string result_torrent = 2; 
    string token = 3; 
}
message TaskResultUploadResponse {
    bool success = 1;
    string status_message = 2;
}

message GetTaskResultRequest {
    string task_id = 1;
    string token = 2; 
}

message GetTaskResultResponse {
    bool success = 1;
    string status_message = 2;
    string result_torrent = 3;
}


message ExecuteTaskRequest {
    string task_id = 1;
    string torrent = 2; 
    float cpu_usage = 3; 
    float gpu_usage = 4; 
    int32 memory_gb = 5;
    int32 gpu_memory_gb = 6;
}

message ExecuteTaskResponse {
    bool success = 1;
    string status_message = 2;
}

message TaskOutputRequest {
    string task_id = 1;
    string token = 2; 
}
message TaskOutputResponse {
    bool success = 1;
    string status_message = 2;
    string output = 3;
}

message StopTaskRequest {
    string task_id = 1;
    string token = 2;
}

message StopTaskResponse {
    bool success = 1;
    string status_message = 2;
}
message StopTaskExecutionRequest {
    string task_id = 1;
}

message StopTaskExecutionResponse {
    bool success = 1;
    string status_message = 2;
}
message TaskUsageRequest {
    string task_id = 1;
    float cpu_usage = 2; 
    float memory_usage = 3; 
    float gpu_usage = 4; 
    float gpu_memory_usage = 5; 
    string token = 6; 
}
message TaskUsageResponse {
    bool success = 1;
    string status_message = 2;
}

message RefreshTokenRequest {
    string old_token = 1;
}
message RefreshTokenResponse {
    bool success = 1;
    string status_message = 2;
    string new_token = 3;
}

message TasklogRequest {
    string task_id = 1;
    string token = 2; 
}
message TasklogResponse {
    bool success = 1;
    string log = 2;
}
    

service UserService {
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse); 
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

service NodeManagerService {
    rpc RegisterWorkerNode(RegisterWorkerNodeRequest) returns (StatusResponse);
    rpc ReportStatus(RunningStatusRequest) returns (RunningStatusResponse);
}

service MasterNodeService {
    rpc UploadTask(UploadTaskRequest) returns (UploadTaskResponse);
    rpc GetTaskResult(GetTaskResultRequest) returns (GetTaskResultResponse);
    rpc GetAllUserTasks(GetAllUserTasksRequest) returns (GetAllUserTasksResponse);
    rpc StopTask(StopTaskRequest) returns (StopTaskResponse);
    rpc GetTasklog(TasklogRequest) returns (TasklogResponse);
}

service WorkerNodeService {
    rpc ExecuteTask(ExecuteTaskRequest) returns (ExecuteTaskResponse);
    rpc TaskOutputUpload(TaskOutputUploadRequest) returns (TaskOutputUploadResponse);
    rpc TaskResultUpload(TaskResultUploadRequest) returns (TaskResultUploadResponse);
    rpc TaskOutput(TaskOutputRequest) returns (TaskOutputResponse);
    rpc StopTaskExecution(StopTaskExecutionRequest) returns (StopTaskExecutionResponse);
    rpc TaskUsage(TaskUsageRequest) returns (TaskUsageResponse);
}