syntax = "proto3";

package nodepool;

option go_package = "./pb";

// ============================================================
// Auth & User
// ============================================================

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    bool success = 1;
    string status_message = 2;
    string token = 3;
}

message RegisterUserRequest {
    string username = 1;
    string password = 2;
}

message RegisterUserResponse {
    bool success = 1;
    string status_message = 2;
}

message GetBalanceRequest {
    string username = 1;
    string token = 2;
}

message GetBalanceResponse {
    bool success = 1;
    string status_message = 2;
    int64 balance = 3;
}

message RefreshTokenRequest {
    string old_token = 1;
}
message RefreshTokenResponse {
    bool success = 1;
    string status_message = 2;
    string new_token = 3;
}

// ============================================================
// Resource Model: CPU / GPU / RAM / VRAM / Storage
// ============================================================

message ResourceSpec {
    int32 cpu_cores = 1;
    int64 memory_mb = 2;        // RAM in MB
    int32 gpu_count = 3;
    string gpu_name = 4;
    int64 vram_mb = 5;          // VRAM in MB
    int32 cpu_score = 6;
    int32 gpu_score = 7;
    int64 storage_total_gb = 8;
    int64 storage_available_gb = 9;
}

message ResourceUsage {
    float cpu_percent = 1;
    float memory_percent = 2;
    float gpu_percent = 3;
    float vram_percent = 4;
    float storage_percent = 5;
}

// ============================================================
// Worker Registration & Status
// ============================================================

message RegisterWorkerNodeRequest {
    string username = 1;
    string ip = 2;
    ResourceSpec resources = 3;
    string location = 4;
    string worker_id = 5;
    string token = 6;
}

message StatusResponse {
    bool success = 1;
    string status_message = 2;
}

message RunningStatusRequest {
    string username = 1;
    string status = 2;
    ResourceUsage usage = 3;
    string token = 4;
    string worker_id = 5;
}

message RunningStatusResponse {
    bool success = 1;
    string status_message = 2;
}

// ============================================================
// Master �� Nodepool: Task Submission / Query / Stop
// ============================================================

message UploadTaskRequest {
    string task_id = 1;
    string torrent = 2;        // BT info-hash or magnet URI
    ResourceSpec requirements = 3;
    string location = 4;
    int32 host_count = 5;
    string token = 6;
    int64 max_cpt = 7;
}

message UploadTaskResponse {
    bool success = 1;
    string status_message = 2;
}

message GetAllUserTasksRequest {
    string token = 1;
}

message GetAllUserTasksResponse {
    repeated TaskInfo tasks = 1;
}

message TaskInfo {
    string task_id = 1;
    string owner = 2;
    string status = 3;
    string status_message = 4;
    string worker_ip = 5;
    string output = 6;
    string result_torrent = 7;
    int64 billed_amount = 8;
    bool billing_settled = 9;
    int32 retry_count = 10;
    int64 wall_time_ms = 11;
    int64 peak_memory_mb = 12;
    double cpu_usage = 13;
    double memory_usage = 14;
    double gpu_usage = 15;
    double gpu_memory_usage = 16;
    bool deterministic = 17;
}


message ListWorkersRequest {
    bool include_offline = 1;
}

message WorkerInfo {
    string worker_id = 1;
    string username = 2;
    string ip = 3;
    string status = 4;
    int32 cpu_cores = 5;
    int32 memory_gb = 6;
    int32 cpu_score = 7;
    int32 gpu_score = 8;
    int32 gpu_memory_gb = 9;
    string gpu_name = 10;
    int64 vram_mb = 11;
    int64 storage_total_gb = 12;
    int64 storage_available_gb = 13;
    bool provider_enabled = 14;
    int32 cpu_cores_limit = 15;
    int32 memory_gb_limit = 16;
    int32 gpu_memory_gb_limit = 17;
    int64 storage_gb_limit = 18;
    int64 min_cpt_per_hour = 19;
    string location = 20;
    double cpu_usage = 21;
    double memory_usage = 22;
    double gpu_usage = 23;
    double gpu_memory_usage = 24;
}

message ListWorkersResponse {
    bool success = 1;
    string status_message = 2;
    repeated WorkerInfo workers = 3;
}

message RemoveWorkerRequest {
    string worker_id = 1;
    string token = 2;
}

message QuoteTaskRequest {
    string token = 1;
    int32 cpu_score = 2;
    int32 gpu_score = 3;
    int32 memory_gb = 4;
    int32 gpu_memory_gb = 5;
    int64 storage_gb = 6;
    int32 host_count = 7;
}

message PricingBreakdown {
    int64 base = 1;
    int64 cpu = 2;
    int64 gpu = 3;
    int64 memory = 4;
    int64 gpu_memory = 5;
    int64 storage = 6;
    int64 host_count = 7;
    int64 per_host_total = 8;
    int64 total = 9;
}

message QuoteTaskResponse {
    bool success = 1;
    int64 quoted_cpt = 2;
    string currency = 3;
    PricingBreakdown breakdown = 4;
}

message GetProviderEarningsRequest {
    string token = 1;
    int64 limit = 2;
}

message ProviderEarningsEntry {
    string task_id = 1;
    string payer_user = 2;
    string provider_worker_id = 3;
    int64 amount_cpt = 4;
    string status = 5;
    string created_at = 6;
}

message GetProviderEarningsResponse {
    bool success = 1;
    string status_message = 2;
    int64 total_earned_cpt = 3;
    string currency = 4;
    repeated ProviderEarningsEntry entries = 5;
}

message GetProviderWorkerSettingsRequest {
    string token = 1;
    string worker_id = 2;
}

message ProviderWorkerSettings {
    bool enabled = 1;
    int32 cpu_cores_limit = 2;
    int32 memory_gb_limit = 3;
    int32 gpu_memory_gb_limit = 4;
    int64 storage_gb_limit = 5;
    int64 min_cpt_per_hour = 6;
}

message GetProviderWorkerSettingsResponse {
    bool success = 1;
    string message = 2;
    string worker_id = 3;
    ProviderWorkerSettings settings = 4;
}

message UpdateProviderWorkerSettingsRequest {
    string token = 1;
    string worker_id = 2;
    ProviderWorkerSettings settings = 3;
}

message UpdateProviderWorkerSettingsResponse {
    bool success = 1;
    string message = 2;
    string worker_id = 3;
    ProviderWorkerSettings settings = 4;
}
message GetTaskResultRequest {
    string task_id = 1;
    string token = 2;
}

message GetTaskResultResponse {
    bool success = 1;
    string status_message = 2;
    string result_torrent = 3;
}

message StopTaskRequest {
    string task_id = 1;
    string token = 2;
}

message StopTaskResponse {
    bool success = 1;
    string status_message = 2;
}

message TasklogRequest {
    string task_id = 1;
    string token = 2;
}

message TasklogResponse {
    bool success = 1;
    string log = 2;
}

message DownloadTaskArtifactRequest {
    string task_id = 1;
    string token = 2;
    string artifact_key = 3;
}

message DownloadTaskArtifactResponse {
    bool success = 1;
    string status_message = 2;
    string filename = 3;
    string content_type = 4;
    bytes data = 5;
}

// ============================================================
// Nodepool �� Worker: Task Dispatch & Reporting
// ============================================================

message ExecuteTaskRequest {
    string task_id = 1;
    string torrent = 2;        // BT info-hash for P2P download
    ResourceSpec resource_limits = 3;
}

message ExecuteTaskResponse {
    bool success = 1;
    string status_message = 2;
}

message TaskOutputUploadRequest {
    string task_id = 1;
    string output = 2;
    string token = 3;
    string worker_id = 4;
}
message TaskOutputUploadResponse {
    bool success = 1;
    string status_message = 2;
}

message TaskResultUploadRequest {
    string task_id = 1;
    string result_torrent = 2;
    string token = 3;
    string worker_id = 4;
}
message TaskResultUploadResponse {
    bool success = 1;
    string status_message = 2;
}

message TaskOutputRequest {
    string task_id = 1;
    string token = 2;
}
message TaskOutputResponse {
    bool success = 1;
    string status_message = 2;
    string output = 3;
}

message StopTaskExecutionRequest {
    string task_id = 1;
}

message StopTaskExecutionResponse {
    bool success = 1;
    string status_message = 2;
}

message TaskUsageRequest {
    string task_id = 1;
    ResourceUsage usage = 2;
    string token = 3;
    string worker_id = 4;
}
message TaskUsageResponse {
    bool success = 1;
    string status_message = 2;
}

// ============================================================
// Batch Runtime (pull-based, future path)
// ============================================================

message DAGNode {
    string task_id = 1;
    repeated string artifact_inputs = 2;
    ResourceSpec resource_requirements = 3;
    int32 max_retries = 4;
    int64 deadline_unix = 5;
    bool deterministic = 6;
    bool side_effects = 7;
    int32 priority = 8;
    string execution_package_ref = 9;
}

message DAGEdge {
    string from_task_id = 1;
    string to_task_id = 2;
}

message DAGIR {
    string job_id = 1;
    repeated DAGNode nodes = 2;
    repeated DAGEdge edges = 3;
}

message ExecutionPackage {
    string runtime_version = 1;
    string task_code_ref = 2;
    repeated string artifact_refs = 3;
    map<string, string> constraints = 4;
}

message ArtifactChunk {
    string chunk_id = 1;
    string sha256 = 2;
    int64 offset = 3;
    int64 size = 4;
}

message ArtifactManifest {
    string artifact_id = 1;
    repeated ArtifactChunk chunks = 2;
    int64 size = 3;
    string compression = 4;
    string content_type = 5;
    string created_by_task = 6;
}

message CacheSummary {
    int64 cache_epoch = 1;
    bytes bloom_filter = 2;
    string partial_cache_digest = 3;
    int64 artifact_count = 4;
    int64 total_bytes = 5;
}

message PullBatchRequest {
    string worker_id = 1;
    int32 max_inflight_batches = 2;
    int32 available_memory_gb = 3;
    int32 queue_capacity = 4;
    CacheSummary cache_summary = 5;
    string token = 6;
}

message TaskLease {
    string task_id = 1;
    ExecutionPackage execution_package = 2;
    repeated ArtifactManifest artifacts = 3;
    ResourceSpec resource_limits = 4;
    int64 deadline_unix = 5;
    int32 priority = 6;
}

message PullBatchResponse {
    bool success = 1;
    string status_message = 2;
    string batch_id = 3;
    repeated TaskLease tasks = 4;
}

message ExecutionMetrics {
    int64 cpu_time_ms = 1;
    int64 wall_time_ms = 2;
    int64 peak_memory_mb = 3;
    int64 download_bytes = 4;
    int64 cache_hits = 5;
}

message CompletedTask {
    string task_id = 1;
    string status = 2;
    string stdout_artifact_ref = 3;
    string stderr_artifact_ref = 4;
    repeated string result_artifact_refs = 5;
    ExecutionMetrics metrics = 6;
}

message CompleteBatchRequest {
    string worker_id = 1;
    string batch_id = 2;
    repeated CompletedTask tasks = 3;
    string token = 4;
}

message CompleteBatchResponse {
    bool success = 1;
    string status_message = 2;
}

message HeartbeatRequest {
    string worker_id = 1;
    string status = 2;
    int32 available_memory_gb = 3;
    int32 queue_capacity = 4;
    string token = 5;
}

message HeartbeatResponse {
    bool success = 1;
    string status_message = 2;
}


// ============================================================
// Admin Billing
// ============================================================

message GetAdminBillingOverviewRequest {
    string token = 1;
}

message GetAdminBillingOverviewResponse {
    bool success = 1;
    string status_message = 2;
    int64 total_payer_debit_cpt = 3;
    int64 total_provider_credit_cpt = 4;
    int64 total_platform_fee_cpt = 5;
    int64 pending_billing_tasks = 6;
    string currency = 7;
}

// ============================================================
// Admin Artifacts
// ============================================================

message GetAdminArtifactOverviewRequest {
    string token = 1;
}

message GetAdminArtifactOverviewResponse {
    bool success = 1;
    string status_message = 2;
    int64 total_artifacts = 3;
    int64 total_size_bytes = 4;
    int64 dedup_hits = 5;
    int64 resumable_artifacts = 6;
    int64 expiring_in_24h = 7;
}

message CleanupAdminArtifactsRequest {
    string token = 1;
    bool dry_run = 2;
}

message CleanupAdminArtifactsResponse {
    bool success = 1;
    string status_message = 2;
    bool dry_run = 3;
    int64 expired_candidates = 4;
    int64 deleted_rows = 5;
    int64 deleted_files = 6;
    int64 file_delete_errors = 7;
}

// ============================================================
// Admin Scheduling Cache
// ============================================================

message WorkerCacheAffinityMetric {
    string worker_id = 1;
    int64 completed_tasks = 2;
    int64 cache_hits = 3;
    int64 recent_completed_tasks_7d = 4;
}

message GetAdminSchedulingCacheMetricsRequest {
    string token = 1;
}

message GetAdminSchedulingCacheMetricsResponse {
    bool success = 1;
    string status_message = 2;
    int64 total_completed_tasks = 3;
    int64 total_cache_hits = 4;
    double cache_hit_rate = 5;
    repeated WorkerCacheAffinityMetric top_workers = 6;
}

message GetAdminSchedulingCacheAlertRequest {
    string token = 1;
    double low_threshold = 2;
    double high_threshold = 3;
}

message GetAdminSchedulingCacheAlertResponse {
    bool success = 1;
    string status_message = 2;
    double low_threshold = 3;
    double high_threshold = 4;
    double cache_hit_rate = 5;
    string severity = 6;
    string message = 7;
}

message CacheAnomalyEntry {
    string severity = 1;
    double cache_hit_rate = 2;
    double low_threshold = 3;
    double high_threshold = 4;
    string message = 5;
    string created_at = 6;
}

message ListAdminSchedulingCacheAnomaliesRequest {
    string token = 1;
    int64 limit = 2;
}

message ListAdminSchedulingCacheAnomaliesResponse {
    bool success = 1;
    string status_message = 2;
    repeated CacheAnomalyEntry entries = 3;
}

// ============================================================
// Worker Trust & Reputation
// ============================================================

message WorkerTrustProfile {
    string worker_id = 1;
    int64 successful_tasks = 2;
    int64 failed_tasks = 3;
    int32 score = 4;
    bool banned = 5;
    string last_attested_at = 6;
}

message GetWorkerTrustProfileRequest {
    string token = 1;
    string worker_id = 2;
}

message GetWorkerTrustProfileResponse {
    bool success = 1;
    string status_message = 2;
    WorkerTrustProfile trust = 3;
}

message UpdateWorkerTrustControlRequest {
    string token = 1;
    string worker_id = 2;
    bool banned = 3;
    int32 score = 4;
}

message UpdateWorkerTrustControlResponse {
    bool success = 1;
    string status_message = 2;
    string worker_id = 3;
    bool banned = 4;
    int32 score = 5;
}

message AdminWorkerTrustEntry {
    string worker_id = 1;
    string username = 2;
    string worker_status = 3;
    int32 score = 4;
    bool banned = 5;
    int64 successful_tasks = 6;
    int64 failed_tasks = 7;
    string last_attested_at = 8;
}

message ListAdminWorkerTrustRequest {
    string token = 1;
}

message ListAdminWorkerTrustResponse {
    bool success = 1;
    string status_message = 2;
    repeated AdminWorkerTrustEntry entries = 3;
}

// ============================================================
// Admin Audit Logs
// ============================================================

message AdminAuditLogEntry {
    string id = 1;
    string username = 2;
    string action = 3;
    string resource = 4;
    string details = 5;
    string created_at = 6;
}

message ListAdminAuditLogsRequest {
    string token = 1;
    int64 limit = 2;
}

message ListAdminAuditLogsResponse {
    bool success = 1;
    string status_message = 2;
    repeated AdminAuditLogEntry entries = 3;
}
// ============================================================
// Services
// ============================================================

service UserService {
    rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
    rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

service NodeManagerService {
    rpc RegisterWorkerNode(RegisterWorkerNodeRequest) returns (StatusResponse);
    rpc ReportStatus(RunningStatusRequest) returns (RunningStatusResponse);
    rpc TaskOutputUpload(TaskOutputUploadRequest) returns (TaskOutputUploadResponse);
    rpc TaskResultUpload(TaskResultUploadRequest) returns (TaskResultUploadResponse);
    rpc TaskUsage(TaskUsageRequest) returns (TaskUsageResponse);
    rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
    rpc RemoveWorker(RemoveWorkerRequest) returns (StatusResponse);
}

service MasterNodeService {
    rpc UploadTask(UploadTaskRequest) returns (UploadTaskResponse);
    rpc GetTaskResult(GetTaskResultRequest) returns (GetTaskResultResponse);
    rpc GetAllUserTasks(GetAllUserTasksRequest) returns (GetAllUserTasksResponse);
    rpc StopTask(StopTaskRequest) returns (StopTaskResponse);
    rpc GetTasklog(TasklogRequest) returns (TasklogResponse);
    rpc DownloadTaskArtifact(DownloadTaskArtifactRequest) returns (DownloadTaskArtifactResponse);
    rpc QuoteTask(QuoteTaskRequest) returns (QuoteTaskResponse);
    rpc GetProviderEarnings(GetProviderEarningsRequest) returns (GetProviderEarningsResponse);
    rpc GetProviderWorkerSettings(GetProviderWorkerSettingsRequest) returns (GetProviderWorkerSettingsResponse);
    rpc UpdateProviderWorkerSettings(UpdateProviderWorkerSettingsRequest) returns (UpdateProviderWorkerSettingsResponse);
    rpc GetAdminBillingOverview(GetAdminBillingOverviewRequest) returns (GetAdminBillingOverviewResponse);
    rpc GetAdminArtifactOverview(GetAdminArtifactOverviewRequest) returns (GetAdminArtifactOverviewResponse);
    rpc CleanupAdminArtifacts(CleanupAdminArtifactsRequest) returns (CleanupAdminArtifactsResponse);
    rpc GetAdminSchedulingCacheMetrics(GetAdminSchedulingCacheMetricsRequest) returns (GetAdminSchedulingCacheMetricsResponse);
    rpc GetAdminSchedulingCacheAlert(GetAdminSchedulingCacheAlertRequest) returns (GetAdminSchedulingCacheAlertResponse);
    rpc ListAdminSchedulingCacheAnomalies(ListAdminSchedulingCacheAnomaliesRequest) returns (ListAdminSchedulingCacheAnomaliesResponse);
    rpc GetWorkerTrustProfile(GetWorkerTrustProfileRequest) returns (GetWorkerTrustProfileResponse);
    rpc UpdateWorkerTrustControl(UpdateWorkerTrustControlRequest) returns (UpdateWorkerTrustControlResponse);
    rpc ListAdminWorkerTrust(ListAdminWorkerTrustRequest) returns (ListAdminWorkerTrustResponse);
    rpc ListAdminAuditLogs(ListAdminAuditLogsRequest) returns (ListAdminAuditLogsResponse);
}

service WorkerNodeService {
    rpc ExecuteTask(ExecuteTaskRequest) returns (ExecuteTaskResponse);
    rpc TaskOutputUpload(TaskOutputUploadRequest) returns (TaskOutputUploadResponse);
    rpc TaskResultUpload(TaskResultUploadRequest) returns (TaskResultUploadResponse);
    rpc TaskOutput(TaskOutputRequest) returns (TaskOutputResponse);
    rpc StopTaskExecution(StopTaskExecutionRequest) returns (StopTaskExecutionResponse);
    rpc TaskUsage(TaskUsageRequest) returns (TaskUsageResponse);
}

service BatchRuntimeService {
    rpc PullBatch(PullBatchRequest) returns (PullBatchResponse);
    rpc CompleteBatch(CompleteBatchRequest) returns (CompleteBatchResponse);
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}
