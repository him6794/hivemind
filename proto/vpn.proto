syntax = "proto3";

package nodepool;

option go_package = "./pb";

// VPN Service: Tailscale-based self-hosted NAT traversal
// Uses Tailscale coordination server (headscale) for peer discovery & NAT hole-punching

// Worker joins the VPN overlay network
message JoinVPNRequest {
    string worker_id = 1;
    string hostname = 2;
    string auth_token = 3;       // JWT auth token
}

message JoinVPNResponse {
    bool success = 1;
    string status_message = 2;
    string virtual_ip = 3;       // Assigned Tailscale IP (100.64.x.x)
    string auth_key = 4;         // Tailscale pre-auth key
    string derp_map = 5;         // DERP relay map for NAT traversal (JSON)
}

// Get peer list for a specific task's P2P swarm
message GetTaskPeersRequest {
    string task_id = 1;
    string worker_id = 2;
    string auth_token = 3;
}

message PeerInfo {
    string worker_id = 1;
    string virtual_ip = 2;
    string hostname = 3;
    bool online = 4;
    int64 last_seen = 5;         // Unix timestamp
}

message GetTaskPeersResponse {
    bool success = 1;
    string status_message = 2;
    repeated PeerInfo peers = 3;
}

// Worker leaves the VPN overlay
message LeaveVPNRequest {
    string worker_id = 1;
    string auth_token = 2;
}

message LeaveVPNResponse {
    bool success = 1;
    string status_message = 2;
}

// Heartbeat: update VPN status / NAT connectivity
message UpdateVPNStatusRequest {
    string worker_id = 1;
    string virtual_ip = 2;
    bool online = 3;
    string auth_token = 4;
}

message UpdateVPNStatusResponse {
    bool success = 1;
    string status_message = 2;
}

service VPNService {
    rpc JoinVPN(JoinVPNRequest) returns (JoinVPNResponse);
    rpc GetTaskPeers(GetTaskPeersRequest) returns (GetTaskPeersResponse);
    rpc LeaveVPN(LeaveVPNRequest) returns (LeaveVPNResponse);
    rpc UpdateVPNStatus(UpdateVPNStatusRequest) returns (UpdateVPNStatusResponse);
}
