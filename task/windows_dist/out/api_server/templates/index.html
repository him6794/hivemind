<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>質數計算分散式系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0f14;
            color: #e4e4e4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #0f1620;
            border-radius: 16px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        h1 {
            text-align: center;
            color: #e8f0ff;
            margin-bottom: 10px;
            font-size: clamp(1.5rem, 2.6vw, 2.05rem);
            font-weight: 650;
            letter-spacing: 0.2px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.62);
            margin-bottom: 40px;
            font-size: 0.95em;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 14px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.72);
            font-weight: 500;
            font-size: 0.95em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            min-width: 0;
        }

        .input-wrapper input,
        .input-wrapper label,
        .input-wrapper span {
            min-width: 0;
        }

        .input-wrapper label {
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .input-wrapper input[type="checkbox"] {
            margin-right: 8px;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 10px;
            color: #fff;
            font-size: 1.1em;
            transition: all 0.3s ease;
            outline: none;
            font-variant-numeric: tabular-nums;
        }

        input[type="number"]:focus {
            border-color: rgba(232, 240, 255, 0.55);
            box-shadow: 0 0 0 3px rgba(232, 240, 255, 0.10);
        }

        .range-display {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 3px solid rgba(255, 255, 255, 0.22);
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.86);
            line-height: 1.45;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .range-display small {
            display: block;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.55);
            overflow-wrap: anywhere;
        }

        button {
            width: 100%;
            padding: 18px;
            background: rgba(232, 240, 255, 0.10);
            color: white;
            border: 1px solid rgba(232, 240, 255, 0.18);
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: none;
        }

        button:hover:not(:disabled) {
            background: rgba(232, 240, 255, 0.16);
        }

        button:active:not(:disabled) {
            background: rgba(232, 240, 255, 0.20);
        }

        button:disabled {
            background: rgba(255, 255, 255, 0.04);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }

        .progress-section {
            display: none;
            margin-top: 30px;
        }

        .progress-section.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            min-width: 0;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: rgba(255, 255, 255, 0.92);
            font-size: clamp(1.25rem, 2.4vw, 1.75rem);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            overflow-wrap: anywhere;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.72);
            font-size: 0.9em;
            gap: 12px;
            flex-wrap: wrap;
            min-width: 0;
        }

        #progressPercent {
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        .progress-bar {
            width: 100%;
            height: 35px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            background: rgba(232, 240, 255, 0.22);
            border-radius: 20px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            color: white;
            font-weight: 600;
            font-size: 0.9em;
            box-shadow: none;
            position: relative;
            overflow: hidden;
            min-width: 0;
        }

        .status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            max-width: 100%;
            overflow-wrap: anywhere;
        }

        .status-running {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.86);
        }

        .status-completed {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            max-width: 100%;
            overflow-wrap: anywhere;
        }

        .error-message.active {
            display: block;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 18px 0;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            min-width: 0;
        }

        .row > * {
            min-width: 0;
        }

        .btn-secondary {
            margin-top: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: rgba(255, 255, 255, 0.86);
            text-transform: none;
            letter-spacing: 0;
            padding: 14px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.06);
        }

        .mono-block {
            margin-top: 14px;
            padding: 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.86);
            overflow-wrap: anywhere;
            white-space: pre-wrap;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.8em;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>質數計算分散式系統</h1>
        <p class="subtitle">使用 10 的冪次方進行大規模質數運算</p>

        <div class="input-section">
            <div class="input-group">
                <label for="powerInput">輸入 n 值 (計算範圍: 1 到 10<sup>n</sup>)</label>
                <div class="input-wrapper">
                    <input type="number" id="powerInput" min="1" max="20" value="12" placeholder="例如: 12">
                </div>
                <div class="range-display" id="rangeDisplay">
                    範圍: 1 到 10<sup>12</sup>
                </div>

                <div class="input-wrapper" style="margin-top: 12px; gap: 10px; display: flex; flex-wrap: wrap; align-items: center;">
                    <label for="chunksInput" style="margin: 0; font-size: 0.95em;">拆分區塊數</label>
                    <input type="number" id="chunksInput" min="1" value="1" style="max-width: 140px;" />
                    <label style="margin: 0; font-size: 0.95em;"><input type="checkbox" id="resumeCheckbox" checked> 續算（從上次進度）</label>
                    <label style="margin: 0; font-size: 0.95em;"><input type="checkbox" id="resetCheckbox"> 重算（清除舊資料）</label>
                </div>

                <div class="range-display" id="stateHint" style="display:none; margin-top: 8px;"></div>

                <div class="divider"></div>

                <div class="row">
                    <label for="repeatsInput" style="margin: 0; font-size: 0.95em;">測試次數</label>
                    <input type="number" id="repeatsInput" min="1" value="1" style="max-width: 140px;" />

                    <label for="workersLimitInput" style="margin: 0; font-size: 0.95em;">允許運算台數</label>
                    <input type="number" id="workersLimitInput" min="0" value="0" style="max-width: 160px;" />

                    <span style="color: rgba(255,255,255,0.55); font-size: 0.9em;">0 代表不限</span>
                </div>
            </div>

            <button id="startButton" onclick="startTask()">開始計算</button>
            <button class="btn-secondary" id="enqueueButton" onclick="enqueueRuns()">加入隊列（可重複測試）</button>
            <button class="btn-secondary" id="refreshQueueButton" onclick="refreshQueueStatus()">更新隊列/結果</button>
            <div class="mono-block" id="queueBlock" style="display:none;"></div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="progress-section" id="progressSection">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">總區塊</div>
                    <div class="stat-value" id="totalChunks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">已完成</div>
                    <div class="stat-value" id="completedChunks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">剩餘</div>
                    <div class="stat-value" id="remainingChunks">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">已耗時</div>
                    <div class="stat-value" id="elapsedTime">0s</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">找到質數</div>
                    <div class="stat-value" id="primesFound">0</div>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-label">
                    <span>進度</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%">
                        <span id="progressText">0%</span>
                    </div>
                </div>
            </div>

            <div class="status-message status-running" id="statusMessage">
                任務進行中...
            </div>
        </div>
    </div>

    <script>
        let progressInterval = null;
        let lastServerState = null;
        let queueInterval = null;

        function formatHumanNumberSafe(value) {
            // 避免超大數字或 Infinity/NaN 造成 UI 混亂
            if (!Number.isFinite(value)) return '';
            // 超過 10^15 改用科學記號避免超長字串
            if (Math.abs(value) >= 1e15) return value.toExponential(3);
            return value.toLocaleString('en-US');
        }

        function updateRangeDisplay() {
            const n = parseInt(document.getElementById('powerInput').value) || 1;
            
            // 避免計算超大數字，只顯示次方（必要時附上安全格式化數字）
            let displayText;
            // n 小時可以顯示完整數字；n 大時避免超長字串與 overflow
            if (n <= 12) {
                const max = Math.pow(10, n);
                const formatted = formatHumanNumberSafe(max);
                displayText = formatted
                    ? `範圍: 1 到 10<sup>${n}</sup> (${formatted})`
                    : `範圍: 1 到 10<sup>${n}</sup>`;
            } else {
                displayText = `範圍: 1 到 10<sup>${n}</sup>`;
            }
            
            // 顯示拆分區塊數（以使用者輸入為準；空值則給建議值）
            let suggestedChunks;
            if (n <= 10) {
                suggestedChunks = 1;
            } else {
                suggestedChunks = Math.max(1, Math.floor(n / 2));
            }

            const chunksInput = document.getElementById('chunksInput');
            let chunks = parseInt(chunksInput.value);
            if (!chunks || chunks < 1) {
                chunks = suggestedChunks;
                chunksInput.value = String(chunks);
            }
            
            document.getElementById('rangeDisplay').innerHTML = 
                `${displayText}<small>將分成 ${chunks} 個區塊處理</small>`;
        }

        document.getElementById('powerInput').addEventListener('input', updateRangeDisplay);
        document.getElementById('chunksInput').addEventListener('input', updateRangeDisplay);

        function applyResumeUiState() {
            const chunksInput = document.getElementById('chunksInput');
            const resume = document.getElementById('resumeCheckbox').checked;
            const reset = document.getElementById('resetCheckbox').checked;
            const hint = document.getElementById('stateHint');

            if (reset) {
                // 重算時不應續算
                document.getElementById('resumeCheckbox').checked = false;
            }

            const effectiveResume = document.getElementById('resumeCheckbox').checked;

            if (lastServerState && lastServerState.has_state_file && lastServerState.power_n && effectiveResume) {
                // 續算會沿用上次的 chunks
                if (lastServerState.total_chunks) {
                    chunksInput.value = String(lastServerState.total_chunks);
                }
                chunksInput.disabled = true;

                if (hint && hint.style.display !== 'none') {
                    const tc = lastServerState.total_chunks || '?';
                    hint.textContent = `偵測到上次狀態：10^${lastServerState.power_n}，已完成 ${lastServerState.completed_chunks}/${tc}。續算會沿用上次區塊數 ${tc}；若要改區塊數請勾選「重算」。`;
                }
            } else {
                chunksInput.disabled = false;
            }

            updateRangeDisplay();
        }

        document.getElementById('resumeCheckbox').addEventListener('change', applyResumeUiState);
        document.getElementById('resetCheckbox').addEventListener('change', applyResumeUiState);

        async function startTask() {
            const n = parseInt(document.getElementById('powerInput').value);
            const chunks = parseInt(document.getElementById('chunksInput').value);
            const resume = document.getElementById('resumeCheckbox').checked;
            const reset = document.getElementById('resetCheckbox').checked;
            const errorMsg = document.getElementById('errorMessage');
            const startButton = document.getElementById('startButton');
            
            errorMsg.classList.remove('active');
            
            if (!n || n < 1) {
                errorMsg.textContent = '請輸入有效的正整數';
                errorMsg.classList.add('active');
                return;
            }

            startButton.disabled = true;
            startButton.textContent = '啟動中...';

            try {
                const response = await fetch('/start_task', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    // reset=true 時強制不續算，避免狀態混淆
                    body: JSON.stringify({ n: n, chunks: chunks, resume: reset ? false : resume, reset: reset })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '啟動任務失敗');
                }

                document.getElementById('progressSection').classList.add('active');
                startProgressMonitoring();

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.classList.add('active');
                startButton.disabled = false;
                startButton.textContent = '開始計算';
            }
        }

        async function enqueueRuns() {
            const n = parseInt(document.getElementById('powerInput').value);
            const chunks = parseInt(document.getElementById('chunksInput').value);
            const repeats = parseInt(document.getElementById('repeatsInput').value) || 1;
            const desiredWorkers = parseInt(document.getElementById('workersLimitInput').value) || 0;

            const errorMsg = document.getElementById('errorMessage');
            const enqueueButton = document.getElementById('enqueueButton');
            errorMsg.classList.remove('active');

            if (!n || n < 1) {
                errorMsg.textContent = '請輸入有效的正整數';
                errorMsg.classList.add('active');
                return;
            }

            enqueueButton.disabled = true;
            enqueueButton.textContent = '加入中...';

            try {
                const resp = await fetch('/enqueue_runs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        n: n,
                        chunks: chunks,
                        repeats: repeats,
                        desired_workers: desiredWorkers > 0 ? desiredWorkers : null,
                    })
                });

                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.error || '加入隊列失敗');
                }

                document.getElementById('progressSection').classList.add('active');
                startProgressMonitoring();
                startQueueMonitoring();
                await refreshQueueStatus();
            } catch (e) {
                errorMsg.textContent = e.message;
                errorMsg.classList.add('active');
            } finally {
                enqueueButton.disabled = false;
                enqueueButton.textContent = '加入隊列（可重複測試）';
            }
        }

        function startQueueMonitoring() {
            if (queueInterval) {
                clearInterval(queueInterval);
            }
            queueInterval = setInterval(refreshQueueStatus, 3000);
            refreshQueueStatus();
        }

        async function refreshQueueStatus() {
            const block = document.getElementById('queueBlock');
            try {
                const sResp = await fetch('/queue_status');
                const s = await sResp.json();
                const rResp = await fetch('/results_tail?n=10');
                const r = await rResp.json();

                const lines = [];
                lines.push(`隊列狀態: ${s.running ? '運行中' : '閒置'}`);
                if (s.current_run && s.current_run.run_id) {
                    const cr = s.current_run;
                    const nVal = cr.n;
                    const chunks = cr.chunks;
                    const w = cr.desired_workers || 0;
                    const rep = (cr.rep_index && cr.rep_total) ? ` | 第 ${cr.rep_index}/${cr.rep_total} 次` : '';
                    lines.push(`目前組合: 10^${nVal} | 台數=${w}（0=不限） | chunks=${chunks}${rep}`);
                    lines.push(`run_id: ${cr.run_id}`);
                }
                lines.push(`隊列剩餘: ${s.queue_length}`);
                lines.push(`允許台數: ${s.max_active_workers || 0}（0=不限）`);
                lines.push(`已參與台數: ${s.active_workers}`);

                if (Array.isArray(r.items) && r.items.length) {
                    lines.push('最近結果（最新在後）:');
                    for (const it of r.items) {
                        const nVal = it.n;
                        const tt = (it.total_time_sec != null) ? `${Number(it.total_time_sec).toFixed(2)}s` : 'n/a';
                        const primes = (it.total_primes != null) ? Number(it.total_primes).toLocaleString('en-US') : 'n/a';
                        lines.push(`- ${it.run_id || ''} | 10^${nVal} | primes=${primes} | time=${tt}`);
                    }
                }

                block.textContent = lines.join('\n');
                block.style.display = 'block';
            } catch (e) {
                // ignore
            }
        }

        function startProgressMonitoring() {
            if (progressInterval) {
                clearInterval(progressInterval);
            }

            progressInterval = setInterval(updateProgress, 1000);
            updateProgress();
        }

        async function updateProgress() {
            try {
                const response = await fetch('/progress');
                const data = await response.json();

                if (!data.initialized) {
                    return;
                }

                document.getElementById('totalChunks').textContent = data.total_chunks;
                document.getElementById('completedChunks').textContent = data.completed_chunks;
                document.getElementById('remainingChunks').textContent = data.remaining_chunks;
                document.getElementById('elapsedTime').textContent = data.elapsed_time + 's';
                document.getElementById('progressPercent').textContent = data.progress_percent + '%';
                document.getElementById('progressText').textContent = data.progress_percent + '%';
                document.getElementById('progressFill').style.width = data.progress_percent + '%';
                
                // 顯示找到的質數總數
                const primesFound = data.total_primes_found || 0;
                document.getElementById('primesFound').textContent = primesFound.toLocaleString('en-US');

                const statusMsg = document.getElementById('statusMessage');
                if (!data.running && data.completed_chunks === data.total_chunks) {
                    statusMsg.textContent = `任務已完成！共找到 ${primesFound.toLocaleString('en-US')} 個質數`;
                    statusMsg.className = 'status-message status-completed';
                    clearInterval(progressInterval);
                    
                    const startButton = document.getElementById('startButton');
                    startButton.disabled = false;
                    startButton.textContent = '開始計算';
                } else {
                    statusMsg.textContent = `任務進行中... (${data.completed_chunks}/${data.total_chunks} 區塊已完成，已找到 ${primesFound.toLocaleString('en-US')} 個質數)`;
                    statusMsg.className = 'status-message status-running';
                }

            } catch (error) {
                console.error('更新進度時出錯:', error);
            }
        }

        // Initialize range display
        updateRangeDisplay();

        // 嘗試載入目前狀態（若之前有跑過可續算）
        (async function() {
            try {
                const resp = await fetch('/task_state');
                const s = await resp.json();
                lastServerState = s;
                const hint = document.getElementById('stateHint');
                if (s && s.has_state_file && s.power_n) {
                    hint.textContent = `偵測到上次狀態：10^${s.power_n}，已完成 ${s.completed_chunks}/${s.total_chunks}。可勾選「續算」直接接續。`;
                    hint.style.display = 'block';
                }
                applyResumeUiState();
            } catch (e) {
                // ignore
            }
        })();
    </script>
</body>
</html>
