services:
  # ============================================
  # Infrastructure
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: hivemind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hivemind-network

  postgres:
    image: postgres:16-alpine
    container_name: hivemind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hivemind}
      POSTGRES_USER: ${POSTGRES_USER:-hivemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hivemind}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hivemind-network

  # ============================================
  # Hivemind Rust Services
  # ============================================

  hivemind:
    build:
      context: .
      dockerfile: hivemind-rs/Dockerfile
    container_name: hivemind
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hivemind}:${POSTGRES_PASSWORD:-hivemind}@postgres:5432/${POSTGRES_DB:-hivemind}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MASTER_HTTP_ADDR: 0.0.0.0:8082
      NODEPOOL_GRPC_ADDR: 0.0.0.0:50051
      WORKER_GRPC_ADDR: 0.0.0.0:50053
      WORKER_CONTROL_HTTP_ADDR: 0.0.0.0:18080
      WORKER_ADVERTISE_ADDR: hivemind:50053
      TORRENT_API_DIR: /app/api/torrents
      TORRENT_BT_DIR: /app/bt_torrents
      TORRENT_ANNOUNCE_URL: ${TORRENT_ANNOUNCE_URL:-http://localhost:6969/announce}
      EXECUTOR_SANDBOX_DIR: /app/sandbox
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "50051:50051"  # gRPC (nodepool)
      - "8082:8082"    # HTTP API (master)
      - "50053:50053"  # gRPC (worker)
      - "18080:18080"  # HTTP API (local worker control)
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hivemind-network
    volumes:
      - hivemind-data:/app/data
      - hivemind-torrents:/app/bt_torrents
      - hivemind-task-packages:/app/api/torrents

  # ============================================
  # Frontend (optional)
  # ============================================

  master-ui:
    build:
      context: ./frontend/master-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8082}
    container_name: hivemind-master-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - hivemind
    networks:
      - hivemind-network

  worker-ui:
    build:
      context: ./frontend/worker-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8082}
        VITE_WORKER_CONTROL_BASE: ${VITE_WORKER_CONTROL_BASE:-http://localhost:18080}
    container_name: hivemind-worker-ui
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - hivemind
    networks:
      - hivemind-network

# ============================================
# Networks
# ============================================

networks:
  hivemind-network:
    driver: bridge
    name: hivemind-network

# ============================================
# Volumes
# ============================================

volumes:
  redis-data:
    name: hivemind-redis-data
  postgres-data:
    name: hivemind-postgres-data
  hivemind-data:
    name: hivemind-data
  hivemind-torrents:
    name: hivemind-torrents
  hivemind-task-packages:
    name: hivemind-task-packages
