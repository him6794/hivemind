name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hivemind_test
          POSTGRES_USER: hivemind
          POSTGRES_PASSWORD: hivemind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hivemind -d hivemind_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hivemind-rs

      - name: Check formatting
        working-directory: hivemind-rs
        run: cargo fmt --all -- --check

      - name: Run tests
        working-directory: hivemind-rs
        env:
          DATABASE_URL: postgres://hivemind:hivemind@127.0.0.1:5432/hivemind_test
          HIVEMIND_TEST_DATABASE_URL: postgres://hivemind:hivemind@127.0.0.1:5432/hivemind_test
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: ci-only-secret-with-at-least-32-bytes
          HIVEMIND_ADMIN_USERS: testuser
        run: cargo test --workspace -- --nocapture --test-threads=1

      - name: Clippy
        working-directory: hivemind-rs
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust dependency audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        working-directory: hivemind-rs
        run: cargo audit

      - name: Check binary crate
        working-directory: hivemind-rs
        run: cargo check -p hivemind-bin

  role-builds:
    name: Role Release Builds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        role:
          - { bin: hivemind-worker, features: worker }
          - { bin: hivemind-master, features: master }
          - { bin: hivemind-nodepool, features: nodepool }
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build role binary
        working-directory: hivemind-rs
        run: cargo build --release --no-default-features --features ${{ matrix.role.features }} --bin ${{ matrix.role.bin }}

  frontend:
    name: Frontend Builds
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - frontend/master-ui
          - frontend/worker-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build

      - name: Unit tests
        working-directory: ${{ matrix.app }}
        run: npm test

      - name: Audit production dependencies
        working-directory: ${{ matrix.app }}
        run: npm audit --omit=dev --audit-level=high

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate compose file
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          JWT_SECRET: ci-only-secret-with-at-least-32-bytes
          WORKER_NODEPOOL_USERNAME: testuser
          WORKER_NODEPOOL_PASSWORD: ci-worker-password
        run: docker compose config

      - name: Run dependency-backed integration tests
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from tests

      - name: Tear down test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v
