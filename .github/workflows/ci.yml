name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  rust:
    name: Rust Workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: hivemind-rs

      - name: Check formatting
        working-directory: hivemind-rs
        run: cargo fmt --all -- --check

      - name: Run tests
        working-directory: hivemind-rs
        run: cargo test --workspace -- --nocapture

      - name: Check binary crate
        working-directory: hivemind-rs
        run: cargo check -p hivemind-bin

  frontend:
    name: Frontend Builds
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app:
          - frontend/master-ui
          - frontend/worker-ui

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.app }}
        run: npm run build

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config
