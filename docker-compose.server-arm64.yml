services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /mnt/ssd/hivemind/redis:/data
    networks: [hivemind-network]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hivemind}
      POSTGRES_USER: ${POSTGRES_USER:-hivemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - /mnt/ssd/hivemind/postgres:/var/lib/postgresql/data
    networks: [hivemind-network]

  headscale:
    image: hivemind-headscale:arm64
    restart: unless-stopped
    command: serve
    volumes:
      - /mnt/ssd/hivemind/headscale:/var/lib/headscale
      - ./infra/headscale/config.yaml:/etc/headscale/config.yaml:ro
      - ./infra/headscale/acl.hujson:/etc/headscale/acl.hujson:ro
    ports:
      - "127.0.0.1:5045:8080"
    networks: [hivemind-network]

  nodepool-vpn:
    image: tailscale/tailscale:stable
    restart: unless-stopped
    hostname: ${NODEPOOL_VPN_HOSTNAME:-hivemind-nodepool}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: ${NODEPOOL_VPN_AUTHKEY:?NODEPOOL_VPN_AUTHKEY must be set}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_ACCEPT_DNS: "false"
      TS_EXTRA_ARGS: --login-server=${HEADSCALE_LOGIN_SERVER:?HEADSCALE_LOGIN_SERVER must be set}
    volumes:
      - /mnt/ssd/hivemind/nodepool-tailscale:/var/lib/tailscale
    networks:
      hivemind-network:
        aliases: [nodepool]
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 10s
      timeout: 5s
      retries: 12

  nodepool:
    image: hivemind-nodepool:arm64
    restart: unless-stopped
    user: "10001:10001"
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hivemind}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-hivemind}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      WORKER_EXECUTION_PRIVATE_KEY_PEM: ${WORKER_EXECUTION_PRIVATE_KEY_PEM:?WORKER_EXECUTION_PRIVATE_KEY_PEM must be set}
      NODEPOOL_GRPC_ADDR: 0.0.0.0:50051
      TORRENT_API_DIR: /app/api/torrents
      TORRENT_BT_DIR: /app/bt_torrents
      # This URL is embedded in task magnets and must be reachable by VPN workers.
      TORRENT_ANNOUNCE_URL: ${TORRENT_ANNOUNCE_URL:-http://100.64.0.1:6969/announce}
      TORRENT_SEED_ADVERTISE_HOST: ${TORRENT_SEED_ADVERTISE_HOST:-100.64.0.1}
      HEADSCALE_URL: ${HEADSCALE_URL:-http://headscale:8080}
      HEADSCALE_LOGIN_SERVER: ${HEADSCALE_LOGIN_SERVER:?HEADSCALE_LOGIN_SERVER must be set}
      HEADSCALE_API_KEY: ${HEADSCALE_API_KEY:?HEADSCALE_API_KEY must be set}
      VPN_BASE_VIRTUAL_IP: ${VPN_BASE_VIRTUAL_IP:-100.64.0.0}
      VPN_NETWORK: ${VPN_NETWORK:-100.64.0.0/10}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODEPOOL_OVERLAY_GRPC_ENDPOINT: ${NODEPOOL_OVERLAY_GRPC_ENDPOINT:-100.64.0.1:50051}
      HEADSCALE_CLIENT_USER: ${HEADSCALE_CLIENT_USER:-nodepool}
    network_mode: service:nodepool-vpn
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started
      headscale:
        condition: service_started
      nodepool-vpn:
        condition: service_healthy
    volumes:
      - /mnt/ssd/hivemind/torrents:/app/bt_torrents
      - /mnt/ssd/hivemind/task-packages:/app/api/torrents

  website-api:
    image: hivemind-website-api:arm64
    restart: unless-stopped
    user: "10001:10001"
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      WEBSITE_HTTP_ADDR: 0.0.0.0:8090
      NODEPOOL_GRPC_ENDPOINT: nodepool-vpn:50051
      NODEPOOL_OVERLAY_GRPC_ENDPOINT: ${NODEPOOL_OVERLAY_GRPC_ENDPOINT:-100.64.0.1:50051}
      HEADSCALE_CLIENT_USER: ${HEADSCALE_CLIENT_USER:-nodepool}
      WEBSITE_CORS_ALLOWED_ORIGINS: ${WEBSITE_CORS_ALLOWED_ORIGINS:?WEBSITE_CORS_ALLOWED_ORIGINS must be set}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:5007:8090"
    depends_on: [nodepool]
    networks: [hivemind-network]

networks:
  hivemind-network:
    driver: bridge
